<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AGENCIAS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg: #050810;
      --color-primary: #00D4FF;
      --font-mono: 'Share Tech Mono', monospace;
      --font-display: 'Rajdhani', sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--color-bg);
      color: var(--color-primary);
      font-family: var(--font-mono);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
      padding: 32px 24px;
      width: 100%;
      max-width: 480px;
    }

    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      text-align: center;
    }

    .titulo {
      font-family: var(--font-display);
      font-size: 64px;
      font-weight: 600;
      letter-spacing: 12px;
      color: var(--color-primary);
      line-height: 1;
    }

    .descripcion {
      font-size: 13px;
      color: rgba(0, 212, 255, 0.6);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .autor {
      font-size: 11px;
      color: rgba(0, 212, 255, 0.35);
      letter-spacing: 1px;
    }

    .botones {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 20px;
      background: transparent;
      border: 1px solid var(--color-primary);
      color: var(--color-primary);
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 6px;
      text-align: center;
      text-decoration: none;
      text-transform: uppercase;
      cursor: pointer;
      /* transición sutil al tocar */
      transition: background 0.15s ease, color 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active {
      background: var(--color-primary);
      color: var(--color-bg);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 class="titulo">AGENCIAS</h1>
      <p class="descripcion">sistema coreográfico experimental</p>
      <p class="autor">Racso Cabrera — 2026</p>
    </div>

    <p style="font-size: 11px; color: rgba(0, 212, 255, 0.35); letter-spacing: 2px; text-transform: uppercase; text-align: center;">Elige tu rol</p>

    <nav class="botones">
      <a href="core/camera.html" class="btn">CÁMARA</a>
      <a href="levels/nivel-01.html" class="btn">CONTROLADOR</a>
    </nav>
  </div>
</body>
</html>
